name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published. The package version is
# derived from the release tag (vX.Y.Z) by setuptools-scm — no manual bump.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Uses PyPI Trusted Publishing (OIDC) — no API token secret is stored.
    # Requires a one-time setup on PyPI: project -> Manage -> Publishing ->
    # add a GitHub publisher for this repo, workflow "publish.yml",
    # and environment "pypi" (see README / release docs).
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history and tags to derive the version

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Build sdist and wheel
        run: uv build

      # Fail fast on a bad release before touching PyPI: the tag-derived version
      # must be a clean X.Y.Z (not a .devN build from an untagged commit) and must
      # not already exist on PyPI (versions can never be reused).
      - name: Verify version is releasable
        run: |
          set -euo pipefail
          version="$(ls dist/*.whl | sed -E 's/.*seed_data-([^-]+)-.*/\1/')"
          echo "Built version: $version"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$version' is not a clean X.Y.Z release. Is the release tagged 'vX.Y.Z' on the target commit?"
            exit 1
          fi
          if curl -sf "https://pypi.org/pypi/seed-data/$version/json" > /dev/null; then
            echo "::error::Version $version already exists on PyPI. Bump to a new, unused version."
            exit 1
          fi
          echo "Version $version is well-formed and not yet on PyPI."

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
