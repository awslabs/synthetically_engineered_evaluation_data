site_name: Synthetically Engineered Evaluation Data
site_description: Synthetically Engineered Evaluation Data
site_url: https://awslabs.github.io/synthetically-engineered-evaluation-data/
repo_url: https://github.com/awslabs/synthetically-engineered-evaluation-data
repo_name: awslabs/synthetically-engineered-evaluation-data

theme:
  name: material
  palette:
    # Light mode (auto-selected when system prefers light)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode (auto-selected when system prefers dark)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.select
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - codehilite
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      title: On this page
      permalink: false
  - pymdownx.superfences:
      custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
   - search
   - awesome-nav
   - mkdocstrings:
        handlers:
          python:
            paths: [../src]
            options:
              docstring_style: google
              show_root_heading: true
              show_source: true

extra_javascript:
  # Workaround for site_url breaking mermaid rendering; see the following for more info:
  # https://github.com/squidfunk/mkdocs-material/issues/3742#issuecomment-1076068038
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
